services:
  - type: web
    name: research-backend
    runtime: python
    rootDir: research_backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input
    startCommand: gunicorn research_backend.wsgi:application
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: research-backend.onrender.com
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        value: https://research-frontend.onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://research-frontend.onrender.com
      - key: PYTHON_VERSION
        value: 3.11.9

  - type: static_site
    name: research-frontend
    rootDir: research_website_frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://research-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
